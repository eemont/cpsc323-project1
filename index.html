<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lexer — Lexical Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --border:   #1e2330;
    --muted:    #3a3f52;
    --text:     #c8cdd8;
    --bright:   #edf0f7;
    --accent:   #5af;

    --kw:   #c792ea;
    --id:   #82aaff;
    --lit:  #f78c6c;
    --op:   #89ddff;
    --sep:  #ffcb6b;
    --cmt:  #546e7a;

    --mono: 'JetBrains Mono', monospace;
    --head: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--head);
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    color: var(--bright);
    letter-spacing: -1px;
    line-height: 1;
  }
  header h1 span { color: var(--accent); }
  .meta {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }
  .meta strong { color: var(--text); }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 10px 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
  }

  /* ── Panels ── */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .panel-header .controls { display: flex; gap: 8px; }

  /* ── Editor ── */
  #editor-wrap { position: relative; flex: 1; display: flex; }
  #highlight-layer, #code-input {
    position: absolute;
    inset: 0;
    padding: 16px 16px 16px 52px;
    font: inherit;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.75;
    white-space: pre;
    overflow: auto;
    tab-size: 4;
  }
  #highlight-layer {
    pointer-events: none;
    color: transparent;
    z-index: 1;
  }
  #code-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    resize: none;
    caret-color: var(--accent);
    z-index: 2;
    width: 100%;
    height: 100%;
  }
  /* line numbers */
  #editor-wrap::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 44px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 3;
  }
  #line-numbers {
    position: absolute;
    left: 0; top: 0;
    width: 44px;
    padding: 16px 8px 16px 0;
    text-align: right;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.75;
    pointer-events: none;
    z-index: 4;
    overflow: hidden;
  }

  /* ── Btn ── */
  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 400;
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--muted); }

  /* ── Output ── */
  #output-panel {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .token-section {
    border-bottom: 1px solid var(--border);
  }
  .section-header {
    padding: 8px 16px;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
  }
  .section-header:hover { background: #181b24; }
  .section-title { display: flex; align-items: center; gap: 8px; }
  .count-badge {
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--muted);
  }
  .section-body {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 16px;
  }
  .section-body.collapsed { display: none; }

  .token {
    display: inline-flex;
    align-items: center;
    padding: 2px 9px;
    border-radius: 3px;
    font-size: 12px;
    border-left: 3px solid currentColor;
    background: color-mix(in srgb, currentColor 10%, transparent);
    cursor: default;
    transition: transform .1s, opacity .1s;
  }
  .token:hover { transform: translateY(-1px); opacity: .85; }

  .t-keyword   { color: var(--kw); }
  .t-identifier{ color: var(--id); }
  .t-literal   { color: var(--lit); }
  .t-operator  { color: var(--op); }
  .t-separator { color: var(--sep); }

  /* empty state */
  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* step counter */
  #stats-bar {
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  #stats-bar span strong { color: var(--text); }

  /* highlight token colors in editor */
  .hl-kw   { color: var(--kw); }
  .hl-id   { color: var(--id); }
  .hl-lit  { color: var(--lit); }
  .hl-op   { color: var(--op); }
  .hl-sep  { color: var(--sep); }
  .hl-cmt  { color: var(--cmt); font-style: italic; }
  .hl-num  { color: var(--lit); }
</style>
</head>
<body>

<header>
  <div>
    <h1>LEX<span>ER</span></h1>
    <div style="font-size:11px;color:var(--muted);margin-top:4px;">Lexical Analyzer · Spring 2024</div>
  </div>
  <div class="meta">
    <strong>Emmanuel Montoya</strong> · Rouni Assaf · Tony Dinh<br/>
    Removes whitespace &amp; comments, then tokenizes source code.
  </div>
</header>

<div class="legend">
  <div class="chip"><div class="dot" style="background:var(--kw)"></div>Keyword</div>
  <div class="chip"><div class="dot" style="background:var(--id)"></div>Identifier</div>
  <div class="chip"><div class="dot" style="background:var(--lit)"></div>Literal</div>
  <div class="chip"><div class="dot" style="background:var(--op)"></div>Operator</div>
  <div class="chip"><div class="dot" style="background:var(--sep)"></div>Separator</div>
  <div class="chip"><div class="dot" style="background:var(--cmt)"></div>Comment (stripped)</div>
</div>

<main>
  <!-- LEFT: editor -->
  <div class="panel">
    <div class="panel-header">
      <span>// input source</span>
      <div class="controls">
        <button class="btn ghost" onclick="loadSample()">load sample</button>
        <button class="btn ghost" onclick="clearEditor()">clear</button>
        <button class="btn" onclick="runLexer()">▶ tokenize</button>
      </div>
    </div>
    <div id="editor-wrap">
      <div id="line-numbers"></div>
      <div id="highlight-layer" aria-hidden="true"></div>
      <textarea id="code-input" spellcheck="false" autocomplete="off"
        placeholder="// paste or type C++ code here..."></textarea>
    </div>
  </div>

  <!-- RIGHT: output -->
  <div class="panel">
    <div class="panel-header"><span>// token output</span></div>
    <div id="output-panel">
      <div class="empty-state">
        <div class="icon">⬡</div>
        Paste code on the left and hit <strong>▶ tokenize</strong>
      </div>
    </div>
    <div id="stats-bar" style="display:none"></div>
  </div>
</main>

<script>
// ── Tokenizer (ported from main.cpp) ──────────────────────────────────────

const KEYWORDS = new Set([
  "include","int","bool","double","string","char","const",
  "return","exit","if","else","for","while","cout",
  "switch","case","break","vector","do","using","namespace",
  "cin","continue","void","long","float","endl"
]);

const DIGITS    = new Set("-.0123456789".split(""));
const OPERATORS = new Set("%+-!=/\\*".split("").concat(["*"]));
const SEPARATORS= /^[,;|"(){}?<>]$/;
const ID_CHARS  = /^[_A-Za-z0-9]$/;

function stripCommentsAndWhitespace(src) {
  let out = "";
  let i = 0;
  while (i < src.length) {
    if (src[i] === '/' && src[i+1] === '/') {
      while (i < src.length && src[i] !== '\n') i++;
    } else if (src[i] === '/' && src[i+1] === '*') {
      i += 2;
      while (i < src.length && !(src[i] === '*' && src[i+1] === '/')) i++;
      i += 2;
    } else if (src[i] === ' ' && src[i+1] === ' ') {
      // collapse multiple spaces to one
      while (i < src.length && src[i] === ' ') i++;
      out += ' ';
    } else {
      if (src[i] === '\n' && out.endsWith('\n')) { i++; continue; }
      out += src[i];
      i++;
    }
  }
  return out;
}

function tokenize(clean) {
  const keywords   = [];
  const identifiers= [];
  const literals   = [];
  const operators  = [];
  const separators = [];

  let i = 0;
  while (i < clean.length) {
    const c = clean[i];

    // skip whitespace / newlines
    if (c === ' ' || c === '\n' || c === '\t' || c === '\r') { i++; continue; }

    // string literal
    if (c === '"') {
      let s = '"'; i++;
      while (i < clean.length && clean[i] !== '"') { s += clean[i]; i++; }
      s += '"'; i++;
      literals.push(s);
      continue;
    }

    // number literal (starts with digit or '-' followed by digit)
    if (/[0-9]/.test(c) || (c === '-' && /[0-9]/.test(clean[i+1] || ''))) {
      let s = c; i++;
      while (i < clean.length && DIGITS.has(clean[i])) { s += clean[i]; i++; }
      literals.push(s);
      continue;
    }

    // operator
    if (OPERATORS.has(c)) {
      let s = c; i++;
      while (i < clean.length && OPERATORS.has(clean[i])) { s += clean[i]; i++; }
      operators.push(s);
      continue;
    }

    // separator
    if (SEPARATORS.test(c)) {
      separators.push(c);
      i++;
      continue;
    }

    // keyword or identifier
    if (ID_CHARS.test(c)) {
      let s = c; i++;
      while (i < clean.length && ID_CHARS.test(clean[i])) { s += clean[i]; i++; }
      if (KEYWORDS.has(s)) keywords.push(s);
      else identifiers.push(s);
      continue;
    }

    // anything else (angle brackets used as operators in #include etc.)
    if (c === '<' || c === '>') { operators.push(c); i++; continue; }

    i++;
  }

  return { keywords, identifiers, literals, operators, separators };
}

// ── Syntax highlighter ────────────────────────────────────────────────────

function highlight(src) {
  // Very lightweight; just enough to make the editor pretty
  // Process char-by-char similar to tokenizer but emit HTML spans
  let html = "";
  let i = 0;
  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  while (i < src.length) {
    // Single-line comment
    if (src[i]==='/' && src[i+1]==='/') {
      let s=''; while(i<src.length && src[i]!=='\n'){s+=src[i];i++;}
      html += `<span class="hl-cmt">${esc(s)}</span>`;
      continue;
    }
    // Block comment
    if (src[i]==='/' && src[i+1]==='*') {
      let s=''; while(i<src.length && !(src[i]==='*'&&src[i+1]==='/')){s+=src[i];i++;}
      s+='*/'; i+=2;
      html += `<span class="hl-cmt">${esc(s)}</span>`;
      continue;
    }
    // String literal
    if (src[i]==='"') {
      let s='"'; i++;
      while(i<src.length&&src[i]!=='"'){s+=src[i];i++;} s+='"'; i++;
      html+=`<span class="hl-lit">${esc(s)}</span>`;
      continue;
    }
    // Number
    if (/[0-9]/.test(src[i])) {
      let s='';
      while(i<src.length&&DIGITS.has(src[i])){s+=src[i];i++;}
      html+=`<span class="hl-num">${esc(s)}</span>`;
      continue;
    }
    // Keyword or identifier
    if (ID_CHARS.test(src[i])) {
      let s='';
      while(i<src.length&&ID_CHARS.test(src[i])){s+=src[i];i++;}
      if (KEYWORDS.has(s)) html+=`<span class="hl-kw">${esc(s)}</span>`;
      else html+=`<span class="hl-id">${esc(s)}</span>`;
      continue;
    }
    // Operator
    if (OPERATORS.has(src[i])||src[i]==='<'||src[i]==='>') {
      let s=src[i]; i++;
      while(i<src.length&&(OPERATORS.has(src[i])||src[i]==='=')){s+=src[i];i++;}
      html+=`<span class="hl-op">${esc(s)}</span>`;
      continue;
    }
    // Separator
    if (SEPARATORS.test(src[i])) {
      html+=`<span class="hl-sep">${esc(src[i])}</span>`; i++;
      continue;
    }
    html+=esc(src[i]); i++;
  }
  return html;
}

// ── UI helpers ────────────────────────────────────────────────────────────

const input  = document.getElementById('code-input');
const hlLayer= document.getElementById('highlight-layer');
const lineNos= document.getElementById('line-numbers');
const output = document.getElementById('output-panel');
const stats  = document.getElementById('stats-bar');

function updateEditor() {
  const src = input.value;
  hlLayer.innerHTML = highlight(src) + '\n';
  const lines = src.split('\n').length;
  lineNos.innerHTML = Array.from({length:lines},(_,i)=>i+1).join('<br/>');
  // sync scroll
  hlLayer.scrollTop  = input.scrollTop;
  hlLayer.scrollLeft = input.scrollLeft;
}

input.addEventListener('input', updateEditor);
input.addEventListener('scroll', () => {
  hlLayer.scrollTop  = input.scrollTop;
  hlLayer.scrollLeft = input.scrollLeft;
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s=input.selectionStart, end=input.selectionEnd;
    input.value=input.value.substring(0,s)+'    '+input.value.substring(end);
    input.selectionStart=input.selectionEnd=s+4;
    updateEditor();
  }
});

function makeSection(title, tokens, cls, colorVar) {
  const div = document.createElement('div');
  div.className = 'token-section';
  div.innerHTML = `
    <div class="section-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
      <div class="section-title">
        <div class="dot" style="background:var(${colorVar});width:8px;height:8px;border-radius:50%"></div>
        <span style="color:var(${colorVar})">${title}</span>
        <span class="count-badge">${tokens.length}</span>
      </div>
      <span style="color:var(--muted);font-size:10px">▾</span>
    </div>
    <div class="section-body">
      ${tokens.length
        ? tokens.map(t=>`<span class="token ${cls}">${escHtml(t)}</span>`).join('')
        : `<span style="color:var(--muted);font-size:11px">none found</span>`}
    </div>`;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function runLexer() {
  const src = input.value.trim();
  if (!src) { output.innerHTML='<div class="empty-state"><div class="icon">⚠</div>Nothing to tokenize.</div>'; return; }

  const clean = stripCommentsAndWhitespace(src);
  const result = tokenize(clean);
  const total = result.keywords.length + result.identifiers.length +
                result.literals.length + result.operators.length + result.separators.length;

  output.innerHTML = '';
  output.appendChild(makeSection('Keywords',    result.keywords,    't-keyword',    '--kw'));
  output.appendChild(makeSection('Identifiers', result.identifiers, 't-identifier', '--id'));
  output.appendChild(makeSection('Literals',    result.literals,    't-literal',    '--lit'));
  output.appendChild(makeSection('Operators',   result.operators,   't-operator',   '--op'));
  output.appendChild(makeSection('Separators',  result.separators,  't-separator',  '--sep'));

  stats.style.display = 'flex';
  stats.innerHTML = `
    <span><strong>${total}</strong> tokens</span>
    <span><strong>${src.split('\n').length}</strong> lines in</span>
    <span><strong>${clean.split('\n').filter(l=>l.trim()).length}</strong> lines after strip</span>
  `;
}

function clearEditor() {
  input.value = '';
  updateEditor();
  output.innerHTML = '<div class="empty-state"><div class="icon">⬡</div>Paste code on the left and hit <strong>▶ tokenize</strong></div>';
  stats.style.display = 'none';
}

function loadSample() {
  input.value = `#include <iostream>
using namespace std;

// Simple example function
int main() {
    int x = 42;
    double pi = 3.14;
    string name = "Lexer";
    bool active = true;

    /* Multi-line comment:
       this should be stripped */
    if (x > 10) {
        cout << name << endl;
    }

    for (int i = 0; i < x; i++) {
        x = x + 1;
    }

    return 0;
}`;
  updateEditor();
  runLexer();
}

// init
updateEditor();
</script>
</body>
</html>
